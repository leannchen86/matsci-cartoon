<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapioca ball microstructure</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<style>
:root {
  --ink: #202422;
  --muted: #617169;
  --field: #181a1c;
  --field-ink: #f8f0db;
  --field-muted: rgba(248, 240, 219, 0.76);
  --panel: rgba(255, 249, 237, 0.9);
  --panel-strong: #fff9ed;
  --line: rgba(42, 39, 33, 0.16);
  --warm: #e07b50;
  --heat: #ea5f43;
  --cold: #7fb9d6;
  --water: #42d9f5;
  --gel: #4fe0a1;
  --gradient: #a9c6ff;
  --stress: #ff5c8a;
  --shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Liberation Sans", sans-serif;
  color: var(--field-ink);
  background: var(--field);
}

button,
input {
  font: inherit;
}

#scene {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.grain {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.3;
  background-image:
    linear-gradient(rgba(184, 243, 255, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(248, 240, 219, 0.035) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: linear-gradient(90deg, transparent 0%, #000 18%, #000 82%, transparent 100%);
}

.shell {
  position: relative;
  z-index: 2;
  min-height: 100dvh;
  padding: 22px;
  pointer-events: none;
}

.topbar {
  display: grid;
  grid-template-columns: minmax(240px, 1fr) 290px;
  grid-template-areas: "brand controls";
  gap: 18px;
  align-items: start;
}

.brand,
.controls {
  min-width: 0;
  pointer-events: auto;
}

.brand {
  grid-area: brand;
  max-width: 420px;
  text-shadow: 0 2px 22px rgba(0, 0, 0, 0.42);
}

h1 {
  margin: 0;
  font-size: clamp(24px, 3.2vw, 44px);
  line-height: 1.02;
  font-weight: 760;
}

.controls {
  grid-area: controls;
  justify-self: end;
  position: relative;
  width: min(290px, calc(100vw - 44px));
  background: var(--panel);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  overflow: visible;
}

.modebar {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  border-bottom: 1px solid var(--line);
  border-radius: 8px 8px 0 0;
  overflow: hidden;
}

.modebar button {
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 38px;
  padding: 0 5px;
  border: 0;
  border-right: 1px solid var(--line);
  color: var(--ink);
  background: rgba(255, 253, 248, 0.72);
  cursor: pointer;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 680;
}

.modebar button:last-child {
  border-right: 0;
}

.modebar button:hover {
  background: rgba(255, 255, 255, 0.95);
}

.modebar button.active {
  color: #fff;
  background: var(--ink);
}

.modebar svg {
  width: 15px;
  height: 15px;
  flex: 0 0 auto;
}

.control-collapse {
  position: absolute;
  top: -12px;
  right: -12px;
  z-index: 4;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  padding: 0;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--ink);
  background: var(--panel-strong);
  box-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
  cursor: pointer;
}

.control-collapse:hover {
  border-color: rgba(32, 36, 34, 0.32);
  background: #fff;
}

.control-collapse svg {
  width: 15px;
  height: 15px;
}

.control-peek {
  position: fixed;
  top: 22px;
  right: 22px;
  z-index: 7;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 34px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: var(--panel);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  pointer-events: auto;
  cursor: pointer;
  font-size: 12px;
  font-weight: 740;
}

.control-peek:hover {
  background: var(--panel-strong);
}

.control-peek svg {
  width: 16px;
  height: 16px;
}

.control-peek[hidden],
body.controls-collapsed .controls {
  display: none;
}

.control-body {
  display: grid;
  gap: 11px;
  padding: 12px;
}

.field {
  display: block;
}

.field label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 11px;
  font-weight: 720;
  color: var(--muted);
}

.field .value {
  text-align: right;
  flex: 0 0 auto;
  font-size: 11px;
  color: var(--ink);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

input[type="range"] {
  display: block;
  width: 100%;
  min-width: 0;
  height: 24px;
  margin-top: 4px;
  accent-color: var(--warm);
}

.toggles {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tool-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 30px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--ink);
  background: var(--panel-strong);
  cursor: pointer;
  font-size: 12px;
}

.tool-btn:hover {
  border-color: rgba(32, 36, 34, 0.32);
}

.tool-btn.active {
  color: #fff;
  border-color: var(--ink);
  background: var(--ink);
}

.tool-btn svg {
  width: 15px;
  height: 15px;
}

.readout {
  width: 100%;
  background: rgba(255, 253, 248, 0.34);
  color: var(--ink);
  border-top: 1px solid var(--line);
  padding: 12px;
}

.readout h2 {
  margin: 0 0 10px;
  font-size: 13px;
  font-weight: 760;
}

.metrics {
  display: grid;
  gap: 8px;
}

.metric {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 4px 8px;
  align-items: center;
}

.metric span {
  font-size: 11px;
  color: var(--muted);
}

.meter {
  grid-column: 1 / -1;
  min-width: 0;
  height: 7px;
  border-radius: 999px;
  background: rgba(32, 36, 34, 0.1);
  overflow: hidden;
}

.meter i {
  display: block;
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: var(--gel);
  transition: width 220ms ease;
}

.meter.water i {
  background: var(--water);
}

.meter.gradient i {
  background: linear-gradient(90deg, var(--water), var(--gradient), var(--stress));
}

.metric b {
  text-align: right;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.scene-tooltip {
  position: fixed;
  left: 0;
  top: 0;
  z-index: 8;
  max-width: 250px;
  padding: 9px 11px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: rgba(255, 249, 237, 0.95);
  box-shadow: 0 12px 30px rgba(40, 38, 33, 0.2);
  backdrop-filter: blur(14px);
  pointer-events: none;
  opacity: 0;
  transform: translate3d(-999px, -999px, 0);
  transition: opacity 120ms ease;
}

.scene-tooltip.visible {
  opacity: 1;
}

.scene-tooltip b {
  display: block;
  margin-bottom: 3px;
  font-size: 12px;
  line-height: 1.2;
}

.scene-tooltip span {
  display: block;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.35;
}

@media (max-width: 620px) {
  .topbar {
    grid-template-columns: 1fr;
    grid-template-areas:
      "brand"
      "controls";
  }

  .controls {
    justify-self: start;
  }

  .shell {
    overflow: hidden;
    max-height: 100dvh;
  }
}

@media (max-width: 620px) {
  html,
  body {
    overflow-x: hidden;
  }

  .shell {
    padding: 14px;
  }

  .topbar {
    gap: 12px;
  }

  h1 {
    font-size: 24px;
    max-width: calc(100vw - 124px);
  }

  .controls {
    position: fixed;
    left: 10px;
    right: auto;
    bottom: max(10px, env(safe-area-inset-bottom));
    z-index: 8;
    width: calc(100vw - 20px);
    max-width: none;
    max-height: min(46dvh, 360px);
    overflow-x: hidden;
    overflow-y: auto;
    overscroll-behavior: contain;
    transform: translateY(0);
    transition: transform 220ms ease, opacity 180ms ease, visibility 180ms ease;
  }

  .control-collapse {
    right: 8px;
  }

  body.controls-collapsed .controls {
    display: block;
    opacity: 0;
    pointer-events: none;
    transform: translateY(calc(100% + 24px));
    visibility: hidden;
  }

  .field {
    position: relative;
    min-width: 0;
  }

  .field label {
    display: block;
    min-height: 18px;
    padding-right: 74px;
  }

  .field .value {
    position: absolute;
    top: 0;
    right: 48px;
  }

  .field input {
    display: block;
    width: 100%;
    margin-top: 7px;
  }

  .control-peek {
    top: auto;
    right: auto;
    bottom: max(12px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
  }
}
</style>
</head>
<body>
<canvas id="scene" aria-label="3D tapioca ball starch microstructure"></canvas>
<div class="grain" aria-hidden="true"></div>

<main class="shell">
  <section class="topbar" aria-label="Tapioca ball starch material state">
    <div class="brand">
      <h1>Tapioca ball microstructure</h1>
    </div>

    <div id="controlPanel" class="controls" aria-label="State controls">
      <button id="collapseControls" class="control-collapse" type="button" aria-label="Hide controls" aria-controls="controlPanel">
        <i data-lucide="chevron-right"></i>
      </button>

      <div class="modebar" role="group" aria-label="Preset conditions">
        <button class="mode active" type="button" data-mode="cooked">
          <i data-lucide="flame"></i><span>Cooked</span>
        </button>
        <button class="mode" type="button" data-mode="fridge">
          <i data-lucide="snowflake"></i><span>Fridge</span>
        </button>
        <button class="mode" type="button" data-mode="microwave">
          <i data-lucide="waves"></i><span>Microwave</span>
        </button>
      </div>

      <div class="control-body">
        <div class="field">
          <label for="temperature">Temperature <span class="value" id="temperatureValue">72 deg C</span></label>
          <input id="temperature" type="range" min="4" max="95" value="72" step="1">
        </div>
        <div class="field">
          <label for="hydration">Ball moisture <span class="value" id="hydrationValue">74%</span></label>
          <input id="hydration" type="range" min="20" max="100" value="74" step="1">
        </div>
        <div class="field">
          <label for="coldTime">Fridge time <span class="value" id="coldTimeValue">0 h</span></label>
          <input id="coldTime" type="range" min="0" max="24" value="0" step="1">
        </div>
        <div class="toggles" role="group" aria-label="View options">
          <button id="motionBtn" class="tool-btn active" type="button">
            <i data-lucide="activity"></i><span>Motion</span>
          </button>
          <button id="resetBtn" class="tool-btn" type="button">
            <i data-lucide="rotate-ccw"></i><span>Reset</span>
          </button>
        </div>
      </div>

      <aside class="readout" aria-label="Material metrics">
        <h2 id="stateTitle">Cooked starch gel</h2>
        <div class="metrics">
          <div class="metric">
            <span>Chewiness</span>
            <div class="meter gel"><i id="chewMeter"></i></div>
            <b id="chewValue">0%</b>
          </div>
          <div class="metric">
            <span>Water mobility</span>
            <div class="meter water"><i id="waterMeter"></i></div>
            <b id="waterValue">0%</b>
          </div>
          <div class="metric">
            <span>Chain alignment</span>
            <div class="meter gel"><i id="crystalMeter"></i></div>
            <b id="crystalValue">0%</b>
          </div>
          <div class="metric">
            <span>Shell/core gradient</span>
            <div class="meter gradient"><i id="gradientMeter"></i></div>
            <b id="gradientValue">0%</b>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <button id="controlPeek" class="control-peek" type="button" aria-label="Show controls" aria-controls="controlPanel" aria-expanded="false" hidden>
    <i data-lucide="sliders-horizontal"></i><span>Controls</span>
  </button>
</main>
<div class="scene-tooltip" id="sceneTooltip" aria-hidden="true"></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

const palette = {
  field: 0x181a1c,
  fog: 0x181a1c,
  floor: 0x111316,
  gridMajor: 0x3b666b,
  gridMinor: 0x5b4937,
  pearlShell: 0xf3cfa8,
  pearlShellCold: 0xd9b98f,
  pearlGel: 0xf6ddb8,
  gel: 0x4fe0a1,
  gelCold: 0x9fb86a,
  water: 0x42d9f5,
  waterCore: 0xd5fbff,
  skinCold: 0xa9c6ff,
  coreWarm: 0xffcf9e,
  stress: 0xff5c8a,
  rim: 0xb8f3ff
};

const canvas = document.querySelector("#scene");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.16;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(palette.field);
scene.fog = new THREE.Fog(palette.fog, 8.4, 16);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.1, 8.6);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.42,
  0.54,
  0.78
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 5.1;
controls.maxDistance = 12;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.34;
controls.target.set(0, 0, 0);

const sceneTooltip = document.querySelector("#sceneTooltip");
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-2, -2);
raycaster.params.Line.threshold = 0.1;
raycaster.params.Points.threshold = 0.16;

const molecularHoverTargets = [];
const surfaceHoverTargets = [];
const tooltipState = {
  x: 0,
  y: 0,
  active: false,
  overUi: false,
  key: ""
};

const pearlGroup = new THREE.Group();
pearlGroup.rotation.set(-0.1, -0.3, 0.02);
scene.add(pearlGroup);

const ambient = new THREE.HemisphereLight(0xdaf6ff, 0x5c4434, 1.55);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff0cf, 2.9);
keyLight.position.set(4.4, 5.4, 6.2);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(palette.water, 1.9);
rimLight.position.set(-5, 2.2, -3);
scene.add(rimLight);

const floor = new THREE.Mesh(
  new THREE.CircleGeometry(9.8, 96),
  new THREE.MeshStandardMaterial({
    color: palette.floor,
    roughness: 0.92,
    metalness: 0,
    transparent: true,
    opacity: 0.66
  })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -3.06;
floor.receiveShadow = true;
scene.add(floor);

const grid = new THREE.GridHelper(18, 36, palette.gridMajor, palette.gridMinor);
grid.position.y = -3.045;
grid.material.transparent = true;
grid.material.opacity = 0.24;
scene.add(grid);

const pearlRadius = 2.58;
const vfxUniforms = {
  uTime: { value: 0 },
  uWater: { value: 0.82 },
  uCrystal: { value: 0.06 },
  uStress: { value: 0.07 },
  uGradient: { value: 0.08 },
  uGelColor: { value: new THREE.Color(palette.gel) },
  uWaterColor: { value: new THREE.Color(palette.water) },
  uCrystalColor: { value: new THREE.Color(palette.gelCold) },
  uSkinColor: { value: new THREE.Color(palette.skinCold) },
  uCoreColor: { value: new THREE.Color(palette.coreWarm) },
  uStressColor: { value: new THREE.Color(palette.stress) }
};

const pearlAuraMaterial = new THREE.ShaderMaterial({
  uniforms: vfxUniforms,
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vView;

    void main() {
      vNormal = normalize(normalMatrix * normal);
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      vView = normalize(-mvPosition.xyz);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform float uWater;
    uniform float uCrystal;
    uniform float uStress;
    uniform float uGradient;
    uniform vec3 uGelColor;
    uniform vec3 uWaterColor;
    uniform vec3 uCrystalColor;
    uniform vec3 uSkinColor;
    uniform vec3 uStressColor;
    varying vec3 vNormal;
    varying vec3 vView;

    void main() {
      float rim = pow(1.0 - abs(dot(normalize(vNormal), normalize(vView))), 2.4);
      float bands = 0.5 + 0.5 * sin(vNormal.y * 18.0 + vNormal.x * 7.0 + uTime * 0.65);
      vec3 hydrated = mix(uGelColor, uWaterColor, 0.45 + uWater * 0.25);
      vec3 aged = mix(uCrystalColor, uStressColor, clamp(uStress * 1.25, 0.0, 1.0));
      vec3 skin = mix(uSkinColor, uStressColor, clamp(uStress * 0.4, 0.0, 1.0));
      vec3 color = mix(hydrated, aged, clamp(uCrystal * 1.2, 0.0, 1.0));
      color = mix(color, skin, clamp(uGradient * (0.25 + bands * 0.16), 0.0, 0.42)) * 1.35;
      float alpha = (rim * 0.18 + bands * uStress * 0.028 + rim * uGradient * 0.07) * (0.7 + uWater * 0.3);
      gl_FragColor = vec4(color, alpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  side: THREE.BackSide
});

const shellMaterial = new THREE.MeshPhysicalMaterial({
  color: palette.pearlShell,
  roughness: 0.34,
  metalness: 0,
  transmission: 0.15,
  transparent: true,
  opacity: 0.27,
  thickness: 0.6,
  clearcoat: 0.62,
  clearcoatRoughness: 0.28,
  side: THREE.DoubleSide
});

const shell = new THREE.Mesh(new THREE.SphereGeometry(pearlRadius, 96, 64), shellMaterial);
shell.castShadow = true;
shell.receiveShadow = true;
shell.userData.tooltip = {
  key: "gradient",
  title: "Moisture-stiffness gradient",
  body: "The outer gel firms first during cold storage, so shell and core respond differently."
};
pearlGroup.add(shell);
surfaceHoverTargets.push(shell);

const pearlAura = new THREE.Mesh(new THREE.SphereGeometry(pearlRadius * 1.035, 96, 64), pearlAuraMaterial);
pearlGroup.add(pearlAura);

const innerMaterial = new THREE.MeshPhysicalMaterial({
  color: palette.pearlGel,
  roughness: 0.68,
  metalness: 0,
  transparent: true,
  opacity: 0.18,
  side: THREE.BackSide
});

const innerGlow = new THREE.Mesh(new THREE.SphereGeometry(pearlRadius * 0.965, 64, 40), innerMaterial);
pearlGroup.add(innerGlow);

function clamp(value, min = 0, max = 1) {
  return Math.min(max, Math.max(min, value));
}

function smoothstep(edge0, edge1, value) {
  const x = clamp((value - edge0) / (edge1 - edge0));
  return x * x * (3 - 2 * x);
}

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function pointInSphere(radius) {
  let point;
  do {
    point = new THREE.Vector3(rand(-1, 1), rand(-1, 1), rand(-1, 1));
  } while (point.lengthSq() > 1);
  return point.multiplyScalar(radius);
}

function makeBasis(axis) {
  const helper = Math.abs(axis.y) < 0.86
    ? new THREE.Vector3(0, 1, 0)
    : new THREE.Vector3(1, 0, 0);
  const side = new THREE.Vector3().crossVectors(axis, helper).normalize();
  const up = new THREE.Vector3().crossVectors(axis, side).normalize();
  return { side, up };
}

function makeCurlPoints(seed, count, radius) {
  const points = [];
  const base = pointInSphere(radius * 0.76);
  const axisA = pointInSphere(1).normalize();
  const axisB = new THREE.Vector3().crossVectors(axisA, new THREE.Vector3(0.2, 1, 0.1)).normalize();
  const axisC = new THREE.Vector3().crossVectors(axisA, axisB).normalize();
  const twist = rand(1.1, 2.8);
  const length = rand(1.4, 3.2);
  const wobble = rand(0.12, 0.34);
  for (let i = 0; i < count; i += 1) {
    const t = i / (count - 1);
    const angle = t * Math.PI * 2 * twist + seed;
    const along = (t - 0.5) * length;
    const radial = 0.34 + Math.sin(seed + t * Math.PI) * 0.14;
    const p = base.clone()
      .add(axisA.clone().multiplyScalar(along))
      .add(axisB.clone().multiplyScalar(Math.cos(angle) * radial))
      .add(axisC.clone().multiplyScalar(Math.sin(angle) * radial * 0.58))
      .add(pointInSphere(wobble));
    if (p.length() > radius) p.setLength(radius * 0.96);
    points.push(p);
  }
  return points;
}

function makeRetroPoints(seed, softPoints, radius, laneIndex) {
  const points = [];
  const count = softPoints.length;
  const center = softPoints.reduce((sum, point) => sum.add(point), new THREE.Vector3()).multiplyScalar(1 / count);
  if (center.length() > radius * 0.82) center.setLength(radius * 0.82);
  const radial = center.lengthSq() > 0.02 ? center.clone().normalize() : pointInSphere(1).normalize();
  const basis = makeBasis(radial);
  const axis = basis.side.clone().multiplyScalar(Math.cos(seed)).add(basis.up.clone().multiplyScalar(Math.sin(seed))).normalize();
  const lane = laneIndex - 0.5;
  const laneOffset = basis.up.clone().multiplyScalar(lane * 0.14)
    .add(radial.clone().multiplyScalar(Math.sin(seed) * 0.035));
  const endToEnd = softPoints[0].distanceTo(softPoints[count - 1]);
  const packedLength = clamp(endToEnd * 0.62 + rand(1.15, 1.85), 1.45, 2.65);
  for (let i = 0; i < count; i += 1) {
    const t = i / (count - 1);
    const along = (t - 0.5) * packedLength;
    const fineOffset = basis.side.clone().multiplyScalar(Math.sin(t * Math.PI * 9 + seed) * 0.02)
      .add(basis.up.clone().multiplyScalar(Math.cos(t * Math.PI * 7 + seed) * 0.026));
    const p = center.clone()
      .add(axis.clone().multiplyScalar(along))
      .add(laneOffset)
      .add(fineOffset);
    if (p.length() > radius) p.setLength(radius * 0.93);
    points.push(p);
  }
  return points;
}

const chainGroup = new THREE.Group();
pearlGroup.add(chainGroup);

const chainData = [];
const chainCount = 40;
const pointsPerChain = 56;
const softChainColor = new THREE.Color(palette.gel);
const coldChainColor = new THREE.Color(0xc7df8b);
const chainsPerLocalPair = 2;

for (let i = 0; i < chainCount; i += 1) {
  const seed = rand(0, Math.PI * 2);
  const laneIndex = i % chainsPerLocalPair;
  const soft = makeCurlPoints(seed, pointsPerChain, pearlRadius * 0.86);
  const retro = makeRetroPoints(seed, soft, pearlRadius * 0.9, laneIndex);
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(pointsPerChain * 3), 3));
  const material = new THREE.LineBasicMaterial({
    color: softChainColor,
    transparent: true,
    opacity: 0.54,
    depthTest: false,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const line = new THREE.Line(geometry, material);
  line.renderOrder = 4;
  line.userData.tooltip = {
    key: "chains",
    title: "Starch polymer chains",
    body: "Amylose and amylopectin chains become more aligned as the pearl cold-ages."
  };
  chainGroup.add(line);
  molecularHoverTargets.push(line);
  chainData.push({ soft, retro, line, phase: seed, laneIndex });
}

const tempColor = new THREE.Color();
const innerDryColor = new THREE.Color(palette.pearlGel);
const innerWetColor = new THREE.Color(palette.waterCore);
const innerColdColor = new THREE.Color(palette.skinCold);

const waterTracerCount = 78;
const waterTracerPositions = new Float32Array(waterTracerCount * 3);
const waterTracerSizes = new Float32Array(waterTracerCount);
const waterTracerPhases = new Float32Array(waterTracerCount);
const waterTracers = Array.from({ length: waterTracerCount }, (_, i) => {
  const position = pointInSphere(pearlRadius * 0.82);
  waterTracerPositions[i * 3] = position.x;
  waterTracerPositions[i * 3 + 1] = position.y;
  waterTracerPositions[i * 3 + 2] = position.z;
  waterTracerSizes[i] = rand(0.58, 1.18);
  waterTracerPhases[i] = rand(0, Math.PI * 2);
  return {
    position,
    velocity: pointInSphere(0.004),
    phase: waterTracerPhases[i],
    scale: rand(0.7, 1.35)
  };
});

const waterTracerGeometry = new THREE.BufferGeometry();
waterTracerGeometry.setAttribute("position", new THREE.Float32BufferAttribute(waterTracerPositions, 3));
waterTracerGeometry.setAttribute("aSize", new THREE.Float32BufferAttribute(waterTracerSizes, 1));
waterTracerGeometry.setAttribute("aPhase", new THREE.Float32BufferAttribute(waterTracerPhases, 1));

const waterTracerMaterial = new THREE.ShaderMaterial({
  uniforms: vfxUniforms,
  vertexShader: `
    uniform float uTime;
    uniform float uWater;
    uniform float uGradient;
    attribute float aSize;
    attribute float aPhase;
    varying float vPulse;
    varying float vMobility;

    void main() {
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      vMobility = clamp(uWater * (1.0 - uGradient * 0.45), 0.0, 1.0);
      vPulse = 0.74 + 0.26 * sin(uTime * (1.6 + uWater * 3.2) + aPhase);
      gl_PointSize = aSize * (2.4 + vMobility * 11.0) * vPulse * (34.0 / max(1.0, -mvPosition.z));
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    uniform vec3 uWaterColor;
    varying float vPulse;
    varying float vMobility;

    void main() {
      vec2 p = gl_PointCoord - 0.5;
      float d = length(p);
      float core = smoothstep(0.48, 0.06, d);
      float halo = smoothstep(0.5, 0.2, d) * 0.52;
      float alpha = (core + halo) * (0.018 + vMobility * 0.62) * vPulse;
      vec3 color = mix(vec3(0.86, 1.0, 1.0), uWaterColor, 0.74) * 1.85;
      gl_FragColor = vec4(color, alpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  depthTest: false,
  blending: THREE.AdditiveBlending
});

const waterTracerPoints = new THREE.Points(waterTracerGeometry, waterTracerMaterial);
waterTracerPoints.renderOrder = 6;
waterTracerPoints.userData.tooltip = {
  key: "water",
  title: "Mobile water tracers",
  body: "Blue tracers show water mobility in the gel; motion drops when chains pack closer."
};
pearlGroup.add(waterTracerPoints);

const waterTracerCoreGeometry = new THREE.SphereGeometry(0.045, 16, 10);
const waterTracerCoreMaterial = new THREE.MeshStandardMaterial({
  color: palette.water,
  emissive: palette.water,
  emissiveIntensity: 0.5,
  roughness: 0.28,
  metalness: 0,
  transparent: true,
  opacity: 0.72,
  depthTest: false
});
const waterTracerCores = new THREE.InstancedMesh(waterTracerCoreGeometry, waterTracerCoreMaterial, waterTracerCount);
waterTracerCores.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
waterTracerCores.renderOrder = 5;
waterTracerCores.userData.tooltip = waterTracerPoints.userData.tooltip;
pearlGroup.add(waterTracerCores);
molecularHoverTargets.push(waterTracerPoints, waterTracerCores);

const waterTracerObject = new THREE.Object3D();

const inputs = {
  temperature: document.querySelector("#temperature"),
  hydration: document.querySelector("#hydration"),
  coldTime: document.querySelector("#coldTime")
};

const outputs = {
  temperature: document.querySelector("#temperatureValue"),
  hydration: document.querySelector("#hydrationValue"),
  coldTime: document.querySelector("#coldTimeValue"),
  title: document.querySelector("#stateTitle"),
  chewMeter: document.querySelector("#chewMeter"),
  waterMeter: document.querySelector("#waterMeter"),
  crystalMeter: document.querySelector("#crystalMeter"),
  gradientMeter: document.querySelector("#gradientMeter"),
  chewValue: document.querySelector("#chewValue"),
  waterValue: document.querySelector("#waterValue"),
  crystalValue: document.querySelector("#crystalValue"),
  gradientValue: document.querySelector("#gradientValue")
};

const modeButtons = [...document.querySelectorAll(".mode")];
const motionBtn = document.querySelector("#motionBtn");
const resetBtn = document.querySelector("#resetBtn");
const controlPanel = document.querySelector("#controlPanel");
const controlPeek = document.querySelector("#controlPeek");
const collapseControlsBtn = document.querySelector("#collapseControls");
const compactControlQuery = window.matchMedia("(max-width: 900px)");
let controlsWereManuallyToggled = false;

const presets = {
  cooked: { temperature: 72, hydration: 74, coldTime: 0 },
  fridge: { temperature: 4, hydration: 48, coldTime: 14 },
  microwave: { temperature: 82, hydration: 68, coldTime: 14 }
};

let animateMotion = true;
let current = {
  chewiness: 0.8,
  waterMobility: 0.82,
  crystallinity: 0.06,
  moistureGradient: 0.08,
  layerStress: 0.07,
  gelation: 0.8,
  reheating: 0.2
};
let target = { ...current };

function setControlPanelCollapsed(collapsed, manual = false) {
  if (manual) {
    controlsWereManuallyToggled = true;
  }
  document.body.classList.toggle("controls-collapsed", collapsed);
  controlPanel.setAttribute("aria-hidden", collapsed ? "true" : "false");
  controlPeek.hidden = !collapsed;
  controlPeek.setAttribute("aria-expanded", collapsed ? "false" : "true");
  collapseControlsBtn.setAttribute("aria-expanded", collapsed ? "false" : "true");
  handleResize();
}

function syncControlPanelForViewport() {
  if (!controlsWereManuallyToggled) {
    setControlPanelCollapsed(compactControlQuery.matches);
  }
}

function computeState() {
  const temperature = Number(inputs.temperature.value);
  const hydration = Number(inputs.hydration.value) / 100;
  const cold = Number(inputs.coldTime.value) / 24;
  const hot = smoothstep(50, 78, temperature);
  const warm = smoothstep(30, 58, temperature);
  const coldRange = 1 - smoothstep(9, 32, temperature);
  const gelation = clamp(smoothstep(58, 76, temperature) * (0.45 + hydration * 0.72));
  const agingHistory = clamp(cold * (1.12 - hydration * 0.56));
  const agingPotential = clamp(coldRange * agingHistory);
  const melt = clamp(smoothstep(52, 90, temperature) * (0.5 + hydration * 0.55));
  const crystallinity = clamp(agingHistory * (1 - 0.72 * melt) + agingPotential * 0.18 + (1 - warm) * cold * 0.04);
  const residualGradient = agingHistory * (1 - melt * 0.72) * 0.32;
  const activeGradient = coldRange * cold * (0.28 + (1 - hydration) * 0.72);
  const moistureGradient = clamp(activeGradient + residualGradient + crystallinity * 0.12);
  const waterMobility = clamp(0.14 + hot * 0.52 + hydration * 0.45 - crystallinity * 0.48);
  const layerStress = clamp(crystallinity * 0.52 + moistureGradient * 0.64 + coldRange * (1 - hydration) * 0.12 - hot * 0.11);
  const reheating = clamp(hot * cold * (0.5 + hydration * 0.5));
  const historyPenalty = cold * (1 - hydration * 0.25) * (0.1 + reheating * 0.12);
  const rawChewiness = 0.42 + waterMobility * 0.6 + gelation * 0.24 - crystallinity * 0.34 - layerStress * 0.12 - moistureGradient * 0.08 - historyPenalty;
  const recoveryCeiling = 1 - cold * (1 - hydration * 0.3) * reheating * 0.44;
  const chewiness = clamp(Math.min(rawChewiness, recoveryCeiling));

  return {
    temperature,
    hydration,
    cold,
    hot,
    gelation,
    crystallinity,
    moistureGradient,
    waterMobility,
    layerStress,
    chewiness,
    reheating
  };
}

function percent(value) {
  return `${Math.round(clamp(value) * 100)}%`;
}

function classifyState(state) {
  if (state.crystallinity > 0.38 && state.temperature < 38) {
    return {
      phase: "retro",
      title: "Fridge retrograded starch"
    };
  }
  if (state.reheating > 0.38) {
    return {
      phase: "reheat",
      title: "Microwave recovery"
    };
  }
  return {
    phase: "gel",
    title: "Cooked starch gel"
  };
}

function updateReadout(state) {
  outputs.temperature.textContent = `${Math.round(state.temperature)} deg C`;
  outputs.hydration.textContent = `${Math.round(state.hydration * 100)}%`;
  outputs.coldTime.textContent = `${Math.round(state.cold * 24)} h`;

  const labels = classifyState(state);
  outputs.title.textContent = labels.title;

  outputs.chewMeter.style.width = percent(state.chewiness);
  outputs.waterMeter.style.width = percent(state.waterMobility);
  outputs.crystalMeter.style.width = percent(state.crystallinity);
  outputs.gradientMeter.style.width = percent(state.moistureGradient);
  outputs.chewValue.textContent = percent(state.chewiness);
  outputs.waterValue.textContent = percent(state.waterMobility);
  outputs.crystalValue.textContent = percent(state.crystallinity);
  outputs.gradientValue.textContent = percent(state.moistureGradient);

}

function currentPresetKey() {
  return Object.entries(presets).find(([, preset]) => (
    Number(inputs.temperature.value) === preset.temperature
    && Number(inputs.hydration.value) === preset.hydration
    && Number(inputs.coldTime.value) === preset.coldTime
  ))?.[0] ?? null;
}

function updatePresetButtons(activeMode = currentPresetKey()) {
  modeButtons.forEach((button) => {
    button.classList.toggle("active", button.dataset.mode === activeMode);
  });
}

function updateTargetFromInputs() {
  target = computeState();
  updateReadout(target);
  updatePresetButtons();
}

modeButtons.forEach((button) => {
  button.addEventListener("click", () => {
    const preset = presets[button.dataset.mode];
    inputs.temperature.value = preset.temperature;
    inputs.hydration.value = preset.hydration;
    inputs.coldTime.value = preset.coldTime;
    updateTargetFromInputs();
  });
});

Object.values(inputs).forEach((input) => {
  input.addEventListener("input", updateTargetFromInputs);
});

motionBtn.addEventListener("click", () => {
  animateMotion = !animateMotion;
  motionBtn.classList.toggle("active", animateMotion);
  controls.autoRotate = animateMotion;
});

resetBtn.addEventListener("click", () => {
  controls.reset();
  controls.target.set(0, 0, 0);
  camera.position.set(0, 1.1, 8.6);
});

collapseControlsBtn.addEventListener("click", () => {
  setControlPanelCollapsed(true, true);
});

controlPeek.addEventListener("click", () => {
  setControlPanelCollapsed(false, true);
});

compactControlQuery.addEventListener("change", syncControlPanelForViewport);

function setSceneTooltipContent(tooltip) {
  if (tooltipState.key === tooltip.key) return;
  tooltipState.key = tooltip.key;
  const title = document.createElement("b");
  title.textContent = tooltip.title;
  const body = document.createElement("span");
  body.textContent = tooltip.body;
  sceneTooltip.replaceChildren(title, body);
}

function hideSceneTooltip() {
  tooltipState.key = "";
  sceneTooltip.classList.remove("visible");
  sceneTooltip.setAttribute("aria-hidden", "true");
  renderer.domElement.style.cursor = "";
}

function positionSceneTooltip() {
  const gap = 16;
  const margin = 12;
  const width = sceneTooltip.offsetWidth;
  const height = sceneTooltip.offsetHeight;
  let left = tooltipState.x + gap;
  let top = tooltipState.y + gap;

  if (left + width > window.innerWidth - margin) {
    left = tooltipState.x - width - gap;
  }
  if (top + height > window.innerHeight - margin) {
    top = tooltipState.y - height - gap;
  }

  sceneTooltip.style.transform = `translate3d(${Math.max(margin, left)}px, ${Math.max(margin, top)}px, 0)`;
}

function nearestTooltipHit(targets) {
  return raycaster
    .intersectObjects(targets, false)
    .find((hit) => hit.object.visible && hit.object.userData.tooltip);
}

function updateSceneHover() {
  if (!tooltipState.active || tooltipState.overUi) {
    hideSceneTooltip();
    return;
  }

  raycaster.setFromCamera(pointer, camera);
  const hit = nearestTooltipHit(molecularHoverTargets) || nearestTooltipHit(surfaceHoverTargets);
  if (!hit) {
    hideSceneTooltip();
    return;
  }

  setSceneTooltipContent(hit.object.userData.tooltip);
  sceneTooltip.setAttribute("aria-hidden", "false");
  sceneTooltip.classList.add("visible");
  renderer.domElement.style.cursor = "help";
  positionSceneTooltip();
}

window.addEventListener("pointermove", (event) => {
  const targetElement = event.target instanceof Element ? event.target : null;
  tooltipState.overUi = Boolean(targetElement?.closest(".brand, .controls, .readout, .control-peek"));
  tooltipState.active = true;
  tooltipState.x = event.clientX;
  tooltipState.y = event.clientY;
  pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
  updateSceneHover();
});

window.addEventListener("pointerleave", () => {
  tooltipState.active = false;
  hideSceneTooltip();
});

window.addEventListener("blur", hideSceneTooltip);

function updateChains(time) {
  const retro = current.crystallinity;
  const water = current.waterMobility;
  const softness = current.chewiness;
  const alignment = smoothstep(0.18, 0.56, retro);
  const chainColor = tempColor.copy(softChainColor).lerp(coldChainColor, retro * 0.75);

  chainData.forEach((chain, chainIndex) => {
    const positions = chain.line.geometry.attributes.position.array;
    const breathe = animateMotion ? Math.sin(time * (0.8 + water) + chain.phase) * 0.035 * water * (1 - alignment * 0.72) : 0;
    for (let i = 0; i < pointsPerChain; i += 1) {
      const morph = clamp(retro * 1.28 - current.reheating * 0.18);
      const p = chain.soft[i].clone().lerp(chain.retro[i], morph);
      const radial = p.clone().normalize().multiplyScalar(breathe + softness * 0.018 * Math.sin(i * 0.45 + time));
      p.add(radial);
      positions[i * 3] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;
    }
    chain.line.geometry.attributes.position.needsUpdate = true;
    chain.line.material.color.copy(chainColor);
    chain.line.material.opacity = 0.5 + water * 0.18 + softness * 0.1 + alignment * 0.32;
    chain.line.visible = true;
  });
}

function updateWaterTracers(time) {
  const mobility = current.waterMobility;
  const gradient = current.moistureGradient;
  const positions = waterTracerGeometry.attributes.position.array;
  const drift = animateMotion ? 0.003 + mobility * 0.032 : 0;
  const allowed = pearlRadius * (0.62 + mobility * 0.22);

  waterTracers.forEach((tracer, i) => {
    if (animateMotion) {
      tracer.velocity.add(pointInSphere(0.0004 + mobility * 0.0034));
      tracer.velocity.multiplyScalar(0.84 + mobility * 0.08);
      tracer.position.add(tracer.velocity.clone().multiplyScalar(24 * drift));
      tracer.position.add(new THREE.Vector3(
        Math.sin(time * (0.7 + mobility * 2.2) + tracer.phase),
        Math.cos(time * (0.9 + mobility * 1.8) + tracer.phase * 1.6),
        Math.sin(time * (0.6 + mobility * 1.4) + tracer.phase * 0.7)
      ).multiplyScalar(0.003 + mobility * 0.02));
    }

    if (tracer.position.length() > allowed) {
      tracer.position.setLength(allowed);
      tracer.velocity.multiplyScalar(-0.35);
    }

    if (gradient > 0.2 && tracer.position.lengthSq() > 0.001) {
      const retainedWaterBand = pearlRadius * (0.32 + (((i * 7) % 11) / 11) * 0.38);
      tracer.position.lerp(tracer.position.clone().normalize().multiplyScalar(retainedWaterBand), gradient * 0.006);
    }

    positions[i * 3] = tracer.position.x;
    positions[i * 3 + 1] = tracer.position.y;
    positions[i * 3 + 2] = tracer.position.z;

    waterTracerObject.position.copy(tracer.position);
    waterTracerObject.scale.setScalar(tracer.scale * (0.16 + mobility * 0.96) * (1 - gradient * 0.24));
    waterTracerObject.updateMatrix();
    waterTracerCores.setMatrixAt(i, waterTracerObject.matrix);
  });

  waterTracerCoreMaterial.opacity = clamp(0.025 + mobility * 0.42 - gradient * 0.035, 0.025, 0.5);
  waterTracerCoreMaterial.emissiveIntensity = 0.025 + mobility * 0.5;
  waterTracerCores.instanceMatrix.needsUpdate = true;
  waterTracerGeometry.attributes.position.needsUpdate = true;
}

function updatePearlSurface() {
  vfxUniforms.uWater.value = current.waterMobility;
  vfxUniforms.uCrystal.value = current.crystallinity;
  vfxUniforms.uStress.value = current.layerStress;
  vfxUniforms.uGradient.value = current.moistureGradient;
  bloomPass.strength = clamp(0.24 + current.waterMobility * 0.2 + current.layerStress * 0.22 + current.moistureGradient * 0.15 + current.reheating * 0.12, 0.24, 0.72);
  bloomPass.radius = clamp(0.3 + current.waterMobility * 0.1 + current.layerStress * 0.1 + current.moistureGradient * 0.08, 0.3, 0.56);
  shellMaterial.opacity = clamp(0.1 + current.crystallinity * 0.18 + current.moistureGradient * 0.12 + (1 - current.waterMobility) * 0.07, 0.1, 0.44);
  shellMaterial.roughness = clamp(0.28 + current.crystallinity * 0.34 + current.moistureGradient * 0.28, 0.25, 0.82);
  shellMaterial.color.setHex(current.crystallinity > 0.28 ? palette.pearlShellCold : palette.pearlShell);
  innerMaterial.opacity = clamp(0.06 + current.waterMobility * 0.07 - current.crystallinity * 0.03 - current.moistureGradient * 0.02, 0.04, 0.14);
  innerMaterial.color.copy(innerDryColor)
    .lerp(innerWetColor, clamp(current.waterMobility * 0.72))
    .lerp(innerColdColor, clamp(current.moistureGradient * 0.28));
  pearlAura.scale.setScalar(1 + current.waterMobility * 0.012 + current.layerStress * 0.02);
}

function animate() {
  const now = performance.now() / 1000;
  vfxUniforms.uTime.value = now;

  current.chewiness += (target.chewiness - current.chewiness) * 0.06;
  current.waterMobility += (target.waterMobility - current.waterMobility) * 0.06;
  current.crystallinity += (target.crystallinity - current.crystallinity) * 0.06;
  current.moistureGradient += (target.moistureGradient - current.moistureGradient) * 0.06;
  current.layerStress += (target.layerStress - current.layerStress) * 0.06;
  current.gelation += (target.gelation - current.gelation) * 0.06;
  current.reheating += (target.reheating - current.reheating) * 0.06;

  updateChains(now);
  updateWaterTracers(now);
  updatePearlSurface();

  pearlGroup.rotation.y += animateMotion ? 0.0014 : 0;
  controls.update();
  updateSceneHover();
  composer.render();
  requestAnimationFrame(animate);
}

function handleResize() {
  const width = window.innerWidth;
  const height = window.innerHeight;
  const controlPanelIsOpen = !document.body.classList.contains("controls-collapsed");
  renderer.setSize(width, height);
  composer.setSize(width, height);
  bloomPass.setSize(width, height);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  if (width < 760) {
    if (controlPanelIsOpen) {
      camera.position.z = 12.6;
      pearlGroup.position.set(0.1, 1.45, 0);
      pearlGroup.scale.setScalar(0.54);
    } else {
      camera.position.z = 10.2;
      pearlGroup.position.set(0.14, 0.1, 0);
      pearlGroup.scale.setScalar(0.76);
    }
  } else if (width < 1040) {
    camera.position.z = 9.2;
    pearlGroup.position.set(-0.68, -0.3, 0);
    pearlGroup.scale.setScalar(0.88);
  } else {
    pearlGroup.position.set(-0.58, -0.26, 0);
    pearlGroup.scale.setScalar(1);
  }
}

window.addEventListener("resize", handleResize);
target = computeState();
current = { ...target };
syncControlPanelForViewport();
handleResize();
updateReadout(target);
updatePresetButtons();
animate();

if (window.lucide) {
  window.lucide.createIcons();
}
</script>
